# set scroll history to 100,000 lines
set-option -g history-limit 100000

run ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux
run ~/.config/tmux/plugins/tmux-continuum/continuum.tmux
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'  # minutes

# modern colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"
#set -g default-terminal "screen-256color"
#set -ga terminal-overrides ",alacritty:Tc"

# unbind the prefix and bind it to Ctrl-s (not ^a since that is main tmux)
unbind C-b
unbind C-j
set -g prefix C-a
bind C-a send-prefix

unbind -T copy-mode-vi C-j
# unbind -T paste C-j
bind-key -T paste C-j send-keys ""


set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'

# Avoid ESC delay
set -s escape-time 0

# Fix titlebar
set -g set-titles on
set -g set-titles-string "#T"

# VIM mode
set -g mode-keys vi
set -g mouse on

# Move between panes with vi keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes in the same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"


bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
# bind-key -T paste C-j send-keys -X cancel


# start window numbers at 1 to match keyboard order with tmux order
set -g base-index 1

# start pane numbers at 1 to match keyboard order with tmux order
setw -g pane-base-index 1

######################
####### THEME ########
######################

# Disable automatic rename (we'll show command separately)
set-option -g automatic-rename off

# Custom rename binding - stores name in @myname option
bind-key , command-prompt -p "rename-window:" "set-option -w @myname '%%'"

# Clear custom name binding (prefix + <) - reverts to just showing application
bind-key < set-option -w -u @myname

# Set catppuccin window text format: "name(app)" or just "app" if no custom name
set -g @catppuccin_window_text "#{?@myname,#{@myname}(#{pane_current_command}),#{pane_current_command}}"
set -g @catppuccin_window_current_text "#{?@myname,#{@myname}(#{pane_current_command}),#{pane_current_command}}"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_date_time_text "%H:%M"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# set -g status-right-length 100
# set -g status-left-length 100
# set -g status-left "#{E:@catppuccin_status_session}"
# set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_cpu}#{E:@catppuccin_status_battery}#{E:@catppuccin_status_date_time}#{E:@catppuccin_status_host}"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_host}"


run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-battery/battery.tmux

set -g pane-border-lines double
# set -g pane-border-status top
# set -g pane-border-format " #{pane_index}: #{pane_current_command} "


