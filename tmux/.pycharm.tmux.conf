source-file ~/.tmux.conf

set -g @resurrect-dir '~/.local/share/tmux/resurrect/pycharm'
run ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux

set -g default-terminal "xterm-256color"

# Catppuccin Mocha theme
set -g status "on"
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-justify "left"

# Pane borders
set -g pane-active-border-style "fg=#b4befe"
set -g pane-border-style "fg=#313244"

# Message styling
set -g message-style "bg=#313244,fg=#cdd6f4"

# Status bar
set -g status-left-length 80
set -g status-right-length 80
set -g status-left "#[fg=#1e1e2e,bg=#b4befe,bold] #(whoami)@#h #[fg=#b4befe,bg=#1e1e2e] "
set -g status-right "#[fg=#a6adc8,bg=#313244] %Y-%m-%d %H:%M #[fg=#1e1e2e,bg=#89b4fa,bold] #S "

# Window tabs
set -g window-status-separator ""
set -g window-status-current-format "#[fg=#1e1e2e,bg=#f9e2af,bold] #I #{?@myname,#{@myname}(#{pane_current_command}),#{pane_current_command}} #[fg=#f9e2af,bg=#1e1e2e]"
set -g window-status-format "#[fg=#cdd6f4,bg=#313244] #I #{?@myname,#{@myname}(#{pane_current_command}),#{pane_current_command}} #[fg=#313244,bg=#1e1e2e]"
